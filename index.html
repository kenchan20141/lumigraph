<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中文教師的一生</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F2F0EB;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text-main: #5E5A54;
            --text-sub: #9C9893;
            
            /* --- 莫蘭迪色系 (教學行動 & 粒子) --- */
            --accent-read: #7C9473;
            --accent-fun: #CF8E8E;
            --accent-plan: #7B9ACC;
            --accent-drill: #C59458;
            
            --accent-admin: #8D857F;
            --accent-dse: #A65E5E;
            
            /* --- 學生資質標籤顏色 --- */
            --color-high: #4E6C50;
            --color-avg: #667C89;
            --color-low: #A67B5B;
            
            --shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Noto Serif TC', serif;
            color: var(--text-main);
            user-select: none;
            touch-action: none; 
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
        }

        #labels-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .student-label {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            transform: translate(-50%, -100%);
            white-space: nowrap;
            transition: opacity 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* =========================================
           頂部儀表板
           ========================================= */
        #top-dashboard {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: auto;
            max-height: 50vh;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            z-index: 20;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 15px 20px;
            box-sizing: border-box;
            gap: 20px;
            overflow-y: auto;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .dash-section {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-right: 20px;
            border-right: 1px solid rgba(0,0,0,0.08);
            min-width: 130px;
        }
        .dash-section:last-child { border-right: none; padding-right: 0; }

        .section-title {
            font-size: 12px; color: var(--text-sub);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 10px; font-weight: bold;
        }

        .stat-row { display: flex; gap: 20px; align-items: flex-end; }
        .stat-box { display: flex; flex-direction: column; min-width: 35px; }
        .stat-label { font-size: 11px; color: var(--text-sub); margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: bold; color: var(--text-main); height: 24px; display: flex; align-items: center; }
        
        .editable {
            cursor: pointer;
            transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }
        .editable:hover { border-bottom: 1px dashed var(--text-sub); }
        
        .inline-input {
            width: 40px;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
            border: none;
            border-bottom: 2px solid var(--accent-dse);
            background: transparent;
            outline: none;
            padding: 0;
            margin: 0;
        }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        button {
            border: none; background: #fff; padding: 8px 12px; border-radius: 10px;
            font-family: inherit; color: var(--text-main); cursor: pointer;
            transition: all 0.2s; display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            min-width: 90px;
            position: relative;
        }
        button:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 5px 12px rgba(0,0,0,0.1); }
        button:active:not(:disabled) { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }

        .btn-icon { font-size: 18px; margin-bottom: 4px; }
        .btn-txt { font-size: 11px; font-weight: bold; }
        .btn-cost { font-size: 10px; opacity: 0.7; margin-top: 2px; }

        .btn-read { border-bottom: 3px solid var(--accent-read); }
        .btn-fun { border-bottom: 3px solid var(--accent-fun); }
        .btn-plan { border-bottom: 3px solid var(--accent-plan); }
        .btn-drill { border-bottom: 3px solid var(--accent-drill); }
        .btn-admin { border-bottom: 3px solid var(--accent-admin); background: #f9f9f9; }
        .btn-system { background: #eee; border: none; }

        #btn-dse {
            background: var(--accent-dse); color: #fff;
            font-weight: bold; border: none;
            display: none; width: 100%;
            animation: pulse 2s infinite;
            margin-top: 8px;
            padding: 12px;
            border-radius: 8px;
        }
        @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.85; } 100% { opacity:1; } }

        .admin-box {
            display: flex; flex-direction: column; gap: 5px; font-size: 11px; margin-bottom: 8px;
        }
        input[type=range] { width: 100%; accent-color: var(--accent-admin); cursor: pointer; }

        #status-text {
            font-size: 12px; font-weight: bold; color: var(--accent-plan);
            margin-top: 8px;
            white-space: normal; 
            overflow: visible; 
            text-overflow: clip;
            line-height: 1.4;
            max-width: 250px;
        }
        .warning-text { color: var(--accent-dse) !important; animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        #need-indicator {
            background: #fff;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            color: var(--text-main);
        }
        .need-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        .floating-bonus {
            position: absolute;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            z-index: 100;
            animation: floatUp 1.2s ease-out forwards;
            white-space: nowrap;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { transform: translateY(-10px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-30px) scale(1); opacity: 0; }
        }

        @media (max-width: 800px) {
            #top-dashboard {
                padding: 12px; gap: 12px; justify-content: flex-start; flex-direction: row; flex-wrap: wrap;
            }
            .dash-section {
                border-right: none; padding-right: 0; 
                flex: 1 1 auto; 
                margin-bottom: 5px;
            }
            .stat-row { gap: 15px; } 
            .stat-value { font-size: 15px; }
            .dash-section.action-section {
                flex: 1 1 100%;
                order: 3;
            }
            .action-section .btn-group {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 8px;
                -webkit-overflow-scrolling: touch;
            }
            button { padding: 8px 6px; min-width: 80px; flex-shrink: 0; }
            #status-text { max-width: 100%; }
        }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 50;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        #modal-box {
            background: #fff; width: 85%; max-width: 450px;
            padding: 30px; border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            text-align: center; border: 2px solid var(--text-main);
        }
        .grade-list { 
            background: #f9f9f9; padding: 15px; border-radius: 10px; 
            margin: 20px 0; text-align: left; font-family: monospace; font-size: 14px; max-height: 250px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="top-dashboard">
        <div class="dash-section">
            <div class="section-title">教師狀態</div>
            <div class="stat-row">
                <div class="stat-box">
                    <span class="stat-label">年齡</span>
                    <span class="stat-value editable" id="disp-age">22</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">心力</span><span class="stat-value" id="disp-energy" style="color:var(--accent-plan)">10.0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">恢復</span><span class="stat-value" id="disp-recover">3/3</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">年級</span><span class="stat-value" id="disp-grade">中一</span>
                </div>
            </div>
            <div id="status-text">準備教學...</div>
        </div>

        <div class="dash-section" style="flex:0 0 auto;">
            <div class="section-title">學生人數</div>
            <select id="sel-student-count" style="padding:6px; border-radius:6px; font-size:13px;">
                <option value="1">1 人</option>
                <option value="2">2 人</option>
                <option value="3">3 人</option>
                <option value="4">4 人</option>
                <option value="5" selected>5 人</option>
            </select>
        </div>

        <div class="dash-section action-section" style="flex: 2;">
            <div class="section-title">教學行動</div>
            
            <div id="need-indicator">
                <span>學生當前需求:</span>
                <span id="need-dot" class="need-dot" style="background:var(--accent-read);"></span>
                <span id="need-text" style="color:var(--accent-read);">增加閱讀量</span>
            </div>

            <div class="btn-group">
                <button id="btn-read" class="btn-read">
                    <span class="btn-icon">📚</span>
                    <span class="btn-txt">增加閱讀量</span>
                    <span class="btn-cost">-1.0</span>
                </button>
                <button id="btn-fun" class="btn-fun">
                    <span class="btn-icon">🍬</span>
                    <span class="btn-txt">設計趣味教學</span>
                    <span class="btn-cost">-3.0</span>
                </button>
                <button id="btn-plan" class="btn-plan">
                    <span class="btn-icon">📝</span>
                    <span class="btn-txt">認真備課</span>
                    <span class="btn-cost">-3.0</span>
                </button>
                <button id="btn-drill" class="btn-drill">
                    <span class="btn-icon">⚔️</span>
                    <span class="btn-txt">操練與批改</span>
                    <span class="btn-cost">-3.0</span>
                </button>
            </div>
        </div>

        <div class="dash-section">
            <div class="section-title">行政/系統</div>
            <div class="admin-box">
                <span>行政消耗: <span id="val-admin">3.0</span></span>
                <input type="range" id="rng-admin" min="0.1" max="10" step="0.1" value="3.0">
            </div>
            <div class="btn-group">
                <button id="btn-admin" class="btn-admin">
                    <span class="btn-icon">📑</span><span class="btn-txt">應付行政</span>
                </button>
                <button id="btn-recover" class="btn-system">
                    <span class="btn-icon">⚡</span><span class="btn-txt">休息恢復</span>
                </button>
                <button id="btn-next" class="btn-system">
                    <span class="btn-icon">📅</span><span class="btn-txt">下一學年</span>
                </button>
            </div>
            <button id="btn-dse">🔥 學生應考 DSE 🔥</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <div style="font-size:50px;">👴</div>
            <h2 style="color:var(--accent-dse); margin:10px 0;">校長室召見</h2>
            <div class="grade-list" id="dse-results"></div>
            <p id="principal-msg" style="text-align:left; line-height:1.6; color:#444;"></p>
            <button id="btn-restart" style="width:100%; background:#333; color:#fff; padding:15px; border-radius:10px; font-weight:bold;">重新開始</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ==========================================
        // 1. 設定與初始化
        // ==========================================
        const style = getComputedStyle(document.body);
        const CONFIG = {
            colors: {
                bg: 0xF2F0EB,
                glassInnate: 0x95a5a6, 
                glassRead: parseInt(style.getPropertyValue('--accent-read').trim().replace('#', '0x')),
                pRead: parseInt(style.getPropertyValue('--accent-read').trim().replace('#', '0x')),
                pFun: parseInt(style.getPropertyValue('--accent-fun').trim().replace('#', '0x')),
                pPlan: parseInt(style.getPropertyValue('--accent-plan').trim().replace('#', '0x')),
                pDrill: parseInt(style.getPropertyValue('--accent-drill').trim().replace('#', '0x')),
                pReject: 0xAAAAAA,
                
                cssRead: style.getPropertyValue('--accent-read').trim(),
                cssFun: style.getPropertyValue('--accent-fun').trim(),
                cssPlan: style.getPropertyValue('--accent-plan').trim(),
                cssDrill: style.getPropertyValue('--accent-drill').trim()
            },
            maxRecoveries: 3,
            globalRenderLimit: 12.0 
        };

        const TEACHER = { 
            age: 22, 
            maxEnergy: 10, 
            currentEnergy: 10, 
            recoveriesLeft: 3,
            energyDebt: 0 
        };

        let currentNeed = 'read'; 
        let targetYCamera = 9.0; // 用於固定相機高度

        function calcMaxEnergy() {
            let base = 10;
            if (TEACHER.age > 25) {
                base -= (TEACHER.age - 25) * 0.2;
            }
            TEACHER.maxEnergy = Math.max(2.0, base);
            if(TEACHER.currentEnergy > TEACHER.maxEnergy) {
                TEACHER.currentEnergy = TEACHER.maxEnergy;
            }
        }
        calcMaxEnergy();

        const ageEl = document.getElementById('disp-age');
        ageEl.addEventListener('click', function() {
            if (this.querySelector('input')) return; 

            const currentVal = this.innerText;
            this.innerHTML = '';
            
            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentVal;
            input.className = 'inline-input';
            
            const save = () => {
                let val = parseInt(input.value);
                if (!isNaN(val) && val > 0 && val < 100) {
                    TEACHER.age = val;
                    calcMaxEnergy();
                    this.innerText = val; 
                    updateUI(); 
                } else {
                    this.innerText = TEACHER.age; 
                }
            };

            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    input.blur();
                }
            });

            this.appendChild(input);
            input.focus();
        });

        function showFloatingBonus(x, y, color) {
            const el = document.createElement('div');
            el.className = 'floating-bonus';
            el.innerText = '+Bonus';
            el.style.color = color;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            
            setTimeout(() => {
                el.remove();
            }, 1200);
        }

        const STUDENT_TYPES = {
            HIGH: { id: 'high', name: '天資聰穎', color: style.getPropertyValue('--color-high').trim(), growRate: [0.5, 0.8], baseScale: 2.0, rejectRate: 0.1, canGrow: true, maxHeight: 6.0 },
            AVG:  { id: 'avg',  name: '資質平庸', color: style.getPropertyValue('--color-avg').trim(), growRate: [0.2, 0.4], baseScale: 1.0, rejectRate: 0.3, canGrow: true, maxHeight: 3.0 },
            LOW:  { id: 'low',  name: '資質駑鈍', color: style.getPropertyValue('--color-low').trim(), growRate: [0.05, 0.1], baseScale: 0.25, rejectRate: 0.6, canGrow: false, maxHeight: 1.5 }
        };

        const GRADES = ["中一", "中二", "中三", "中四", "中五", "中六"];
        let currentGradeIndex = 0;
        let students = [];
        let particles = [];
        let isDseMode = false;
        let hasDoneAdmin = false; 
        let controls; 

        // ==========================================
        // Three.js 場景
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(CONFIG.colors.bg, 20, 90);

        const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 150);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = false;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 修改：啟用平移功能 (Pan) 以便手機操控
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false; 
        controls.enableZoom = true;
        controls.enablePan = true;          // 啟用平移
        controls.screenSpacePanning = true; // 平移方向平行於畫面（左右上下）
        controls.minDistance = 20;     
        controls.maxDistance = 80;     
        controls.zoomSpeed = 1.0;

        // 設定觸控：單指平移，雙指縮放
        controls.touches = {
            ONE: THREE.TOUCH.PAN,
            TWO: THREE.TOUCH.DOLLY_PAN
        };
        // 設定滑鼠：左鍵平移 (電腦版方便測試)
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN,
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.ROTATE
        };

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(0, 30, 20);
        scene.add(dirLight);

        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(500, 500),
            new THREE.MeshStandardMaterial({ color: CONFIG.colors.bg, roughness: 1 })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -2; 
        scene.add(plane);

        const matGlassInnate = new THREE.MeshPhysicalMaterial({
            color: CONFIG.colors.glassInnate,
            metalness: 0.1, roughness: 0.1,
            transmission: 0.6, transparent: true, opacity: 0.9,
            side: THREE.DoubleSide
        });

        const matGlassRead = new THREE.MeshPhysicalMaterial({
            color: CONFIG.colors.glassRead,
            metalness: 0.0, roughness: 0.1,
            transmission: 0.5, transparent: true, opacity: 0.8,
            side: THREE.DoubleSide
        });

        // ==========================================
        // 學生類別
        // ==========================================
        class Student {
            constructor(id, xPos, typeOverride = null) {
                this.id = id;
                this.xPos = xPos;
                if (typeOverride) {
                    this.type = typeOverride;
                } else {
                    const rand = Math.random();
                    if (rand < 0.2) this.type = STUDENT_TYPES.HIGH;
                    else if (rand < 0.7) this.type = STUDENT_TYPES.AVG;
                    else this.type = STUDENT_TYPES.LOW;
                }

                this.baseHeight = 0.8 * this.type.baseScale; 
                this.readingHeight = 0; 
                this.landedParticles = [];

                this.labelEl = document.createElement('div');
                this.labelEl.className = 'student-label';
                document.getElementById('labels-container').appendChild(this.labelEl);
                this.updateLabelText();

                this.group = new THREE.Group();
                this.group.position.set(xPos, 0, 0); 
                scene.add(this.group);

                this.baseMesh = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 1, 64, 1, true), matGlassInnate);
                this.group.add(this.baseMesh);
                
                const bottomCap = new THREE.Mesh(new THREE.CircleGeometry(2, 64), matGlassInnate);
                bottomCap.rotation.x = -Math.PI/2;
                this.group.add(bottomCap);

                this.readGroup = new THREE.Group();
                this.group.add(this.readGroup);

                this.readMesh = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 1, 64, 1, true), matGlassRead);
                this.readGroup.add(this.readMesh);

                const ring = new THREE.Mesh(new THREE.TorusGeometry(2.05, 0.05, 16, 100), new THREE.MeshStandardMaterial({color: 0x7f8c8d}));
                ring.rotation.x = Math.PI/2;
                this.readGroup.add(ring);

                this.updateVisuals(true);
            }

            getTotalHeight() { return this.baseHeight + this.readingHeight; }
            getRimY() { return this.getTotalHeight(); }

            tryGrowReading() {
                if (!this.type.canGrow || this.getTotalHeight() >= this.type.maxHeight) {
                    this.shake();
                    return false;
                }
                this.readingHeight += 0.4;
                this.updateVisuals();
                return true;
            }

            growGrade() {
                if (this.getTotalHeight() >= this.type.maxHeight) return;
                const min = this.type.growRate[0];
                const max = this.type.growRate[1];
                let growth = Math.random() * (max - min) + min;
                if (this.getTotalHeight() + growth > this.type.maxHeight) growth = this.type.maxHeight - this.getTotalHeight();
                this.baseHeight += growth;
                this.updateVisuals();
            }

            shake() { gsap.to(this.group.position, { x: this.xPos + 0.1, duration: 0.05, yoyo: true, repeat: 3 }); }

            updateLabelText() {
                this.labelEl.innerHTML = `<span style="color:${this.type.color}">${this.type.name}</span>: ${this.landedParticles.length}`;
            }

            updateVisuals(instant = false) {
                const dur = instant ? 0 : 0.8;
                gsap.to(this.baseMesh.scale, { y: this.baseHeight, duration: dur });
                gsap.to(this.baseMesh.position, { y: this.baseHeight / 2, duration: dur });

                const readH = Math.max(0.01, this.readingHeight);
                gsap.to(this.readGroup.position, { y: this.baseHeight, duration: dur });
                gsap.to(this.readMesh.scale, { y: readH, duration: dur });
                gsap.to(this.readMesh.position, { y: readH / 2, duration: dur });
            }

            dispose() { if (this.labelEl) this.labelEl.remove(); }
        }

        function initStudents(count) {
            students.forEach(s => { scene.remove(s.group); s.dispose(); });
            students = [];
            particles.forEach(p => scene.remove(p));
            particles = [];

            const spacing = 5.0;
            const totalWidth = (count - 1) * spacing;
            const startX = -totalWidth / 2;

            let types = [];
            if (count === 5) {
                types = [STUDENT_TYPES.LOW, STUDENT_TYPES.LOW]; 
                for(let k=0; k<3; k++) {
                    const r = Math.random();
                    if(r < 0.2) types.push(STUDENT_TYPES.HIGH);
                    else if(r < 0.6) types.push(STUDENT_TYPES.AVG);
                    else types.push(STUDENT_TYPES.LOW);
                }
                types.sort(() => Math.random() - 0.5);
            }

            for (let i = 0; i < count; i++) {
                const typeToUse = (types.length > i) ? types[i] : null;
                students.push(new Student(i, startX + i * spacing, typeToUse));
            }
            updateCamera(count);
        }

        function updateCamera(count) {
            const isMobile = window.innerWidth < 800;
            
            // 手機版讓相機向上看(位置低一點)，讓學生容器更貼近螢幕下方
            targetYCamera = isMobile ? 13.0 : 9.0;
            const baseZ = isMobile ? 40 : 28; 
            const zDist = baseZ + (count * 2.0); 

            // 重置 OrbitControls 的 target，確保切換人數時視角居中
            gsap.to(controls.target, { x: 0, y: targetYCamera, z: 0, duration: 1.0 });
            gsap.to(camera.position, { x: 0, y: 15, z: zDist, duration: 1.0, onUpdate: () => controls.update() });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateCamera(students.length);
        });

        // ==========================================
        // 粒子系統
        // ==========================================
        function spawnParticle(type, student) {
            const isRejected = Math.random() < student.type.rejectRate;
            let color = CONFIG.colors.pPlan;
            let geo = new THREE.BoxGeometry(0.22, 0.22, 0.22);

            if (type === 'read') { color = CONFIG.colors.pRead; geo = new THREE.IcosahedronGeometry(0.18, 0); }
            else if (type === 'fun') { color = CONFIG.colors.pFun; geo = new THREE.DodecahedronGeometry(0.20, 0); }
            else if (type === 'drill') { color = CONFIG.colors.pDrill; geo = new THREE.TetrahedronGeometry(0.25); }

            if (isRejected) color = CONFIG.colors.pReject;

            const p = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: color, roughness: 0.4 }));
            const jitter = 0.8;
            p.position.set(
                student.xPos + (Math.random()-0.5) * jitter, 
                student.getRimY() + 8 + Math.random()*3, 
                (Math.random()-0.5) * jitter
            );
            
            let vx = (Math.random()-0.5)*0.05;
            let vz = (Math.random()-0.5)*0.05;
            if (isRejected) vx = (Math.random() > 0.5 ? 1 : -1) * (0.3 + Math.random()*0.2);

            p.userData = { vel: new THREE.Vector3(vx, -0.25, vz), student: student, state: 'falling', rejected: isRejected };
            scene.add(p);
            particles.push(p);
        }

        function spawnDirectLandedParticle(student) {
            const rimY = student.getRimY();
            const fillHeight = student.landedParticles.length * 0.006; 
            if (fillHeight > rimY) return;

            const colors = [CONFIG.colors.pPlan, CONFIG.colors.pDrill, CONFIG.colors.pFun];
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(0.22, 0.22, 0.22),
                new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] })
            );
            const r = Math.random() * 1.5;
            const theta = Math.random() * Math.PI * 2;
            const y = fillHeight + Math.random() * 0.5;
            p.position.set(student.xPos + r * Math.cos(theta), y, r * Math.sin(theta));
            p.userData = { student: student, state: 'landed' };
            scene.add(p);
            particles.push(p);
            student.landedParticles.push(p);
            student.updateLabelText();
        }

        // ==========================================
        // UI & 邏輯
        // ==========================================
        function setStatus(text, isError=false) {
            const el = document.getElementById('status-text');
            el.innerText = text;
            el.className = isError ? "warning-text" : "";
            el.style.color = isError ? 'var(--accent-dse)' : 'var(--accent-plan)';
        }

        function randomizeStudentNeed() {
            const r = Math.random();
            const dot = document.getElementById('need-dot');
            const txt = document.getElementById('need-text');
            
            if (r < 0.7) {
                currentNeed = 'read';
                txt.innerText = "增加閱讀量";
                txt.style.color = "var(--accent-read)";
                dot.style.background = "var(--accent-read)";
            } else {
                const others = [
                    { id: 'fun', label: '設計趣味教學', color: 'var(--accent-fun)' },
                    { id: 'plan', label: '認真備課', color: 'var(--accent-plan)' },
                    { id: 'drill', label: '操練與批改', color: 'var(--accent-drill)' }
                ];
                const choice = others[Math.floor(Math.random() * others.length)];
                currentNeed = choice.id;
                txt.innerText = choice.label;
                txt.style.color = choice.color;
                dot.style.background = choice.color;
            }
        }

        function checkDSECondition() {
            if (currentGradeIndex === 5 && TEACHER.currentEnergy <= 0.1) {
                document.getElementById('btn-dse').style.display = 'block';
                document.getElementById('btn-recover').disabled = true;
                document.getElementById('btn-next').disabled = true;
                document.getElementById('btn-admin').disabled = true;
            } else {
                document.getElementById('btn-dse').style.display = 'none';
            }
        }

        function updateUI() {
            const ageDisplay = document.getElementById('disp-age');
            if (!ageDisplay.querySelector('input')) {
                ageDisplay.innerText = TEACHER.age;
            }

            document.getElementById('disp-energy').innerText = TEACHER.currentEnergy.toFixed(1);
            document.getElementById('disp-recover').innerText = `${TEACHER.recoveriesLeft}/${CONFIG.maxRecoveries}`;
            document.getElementById('disp-grade').innerText = GRADES[currentGradeIndex];
            
            const adminCost = parseFloat(document.getElementById('rng-admin').value);
            document.getElementById('val-admin').innerText = adminCost.toFixed(1);

            const hasEnergy = TEACHER.currentEnergy > 0.5;
            document.getElementById('btn-read').disabled = TEACHER.currentEnergy < 1.0;
            document.getElementById('btn-fun').disabled = !hasEnergy;
            document.getElementById('btn-plan').disabled = !hasEnergy;
            document.getElementById('btn-drill').disabled = !hasEnergy;
            
            document.getElementById('btn-admin').disabled = hasDoneAdmin;
            
            const isFullEnergy = TEACHER.currentEnergy >= TEACHER.maxEnergy;
            document.getElementById('btn-recover').disabled = TEACHER.recoveriesLeft <= 0 || isFullEnergy || isDseMode;
            
            document.getElementById('btn-next').disabled = isDseMode || !hasDoneAdmin;

            if (!hasDoneAdmin && !isDseMode) {
                if (document.getElementById('status-text').innerText === "準備教學...") {
                    document.getElementById('status-text').innerText = "本學年需完成行政工作";
                }
            }

            checkDSECondition();
        }

        function spendEnergy(maxCost) {
            if (TEACHER.currentEnergy <= 0) return 0;
            const actual = Math.min(maxCost, TEACHER.currentEnergy);
            TEACHER.currentEnergy -= actual;
            if(TEACHER.currentEnergy < 0.05) TEACHER.currentEnergy = 0;
            updateUI();
            return actual;
        }

        // 修改：降低 Bonus 的比例，避免過度獎勵
        function getParticleCount(baseCount, actionId) {
            if (actionId === currentNeed) {
                // 將 Bonus 比例從 0.3 (30%) 降低到 0.2 (20%)，避免一次爆發太多
                const bonus = Math.ceil(baseCount * 0.2); 
                return { count: baseCount + bonus, isBonus: true };
            }
            return { count: baseCount, isBonus: false };
        }

        function handleAction(actionId, cost, baseParticles, name, growReading = false) {
            if (spendEnergy(cost) > 0) {
                const { count, isBonus } = getParticleCount(baseParticles, actionId);
                let limitReached = false;
                
                if (isBonus) {
                    const btn = document.getElementById('btn-' + actionId);
                    const rect = btn.getBoundingClientRect();
                    let color = '#333';
                    if (actionId === 'read') color = CONFIG.colors.cssRead;
                    if (actionId === 'fun') color = CONFIG.colors.cssFun;
                    if (actionId === 'plan') color = CONFIG.colors.cssPlan;
                    if (actionId === 'drill') color = CONFIG.colors.cssDrill;
                    
                    showFloatingBonus(rect.left + rect.width/2 - 20, rect.top, color);
                }

                students.forEach(s => {
                    if (growReading) {
                        const grew = s.tryGrowReading();
                        if (!grew) limitReached = true;
                    }
                    
                    const spawnInterval = growReading ? 30 : 0;
                    for(let i=0; i < count; i++) {
                        setTimeout(() => spawnParticle(actionId, s), i * spawnInterval);
                    }
                    
                    if (!growReading && s.readingHeight > 0.5) {
                        setTimeout(()=>spawnParticle(actionId, s), 300);
                    }
                });

                let msg = name;
                if (isBonus) msg += " (教學相長！)";
                
                if (growReading && limitReached) {
                    setStatus(msg + " 但有學生達資質上限。", true);
                } else {
                    setStatus(msg);
                }

                randomizeStudentNeed();
            }
        }

        document.getElementById('btn-read').addEventListener('click', () => {
            // 修改：將基礎粒子數從 25 降為 14 (其他是8~10，14約多出1/3)
            handleAction('read', 1.0, 14, "增加閱讀量：提升維度！", true);
        });

        document.getElementById('btn-fun').addEventListener('click', () => {
            handleAction('fun', 3.0, 8, "設計趣味教學：氣氛活躍。");
        });

        document.getElementById('btn-plan').addEventListener('click', () => {
            handleAction('plan', 3.0, 8, "認真備課：知識傳遞。");
        });

        document.getElementById('btn-drill').addEventListener('click', () => {
            handleAction('drill', 3.0, 10, "操練與批改：填塞訓練。");
        });

        document.getElementById('btn-admin').addEventListener('click', () => {
            const cost = parseFloat(document.getElementById('rng-admin').value);
            
            if (!hasDoneAdmin) {
                if (TEACHER.currentEnergy >= cost) {
                    TEACHER.currentEnergy -= cost;
                    setStatus("完成行政工作，可進入下學年。");
                } else {
                    const overdraft = cost - TEACHER.currentEnergy;
                    TEACHER.energyDebt += overdraft;
                    TEACHER.currentEnergy = 0;
                    setStatus(`勉強應付行政 (透支 ${overdraft.toFixed(1)}，下學年償還)...`, true);
                }
                hasDoneAdmin = true;
                updateUI();
            }
        });

        document.getElementById('btn-recover').addEventListener('click', () => {
            if (TEACHER.recoveriesLeft > 0) {
                TEACHER.currentEnergy = TEACHER.maxEnergy;
                TEACHER.recoveriesLeft--;
                updateUI();
                setStatus("休息恢復精力。");
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (!hasDoneAdmin) {
                setStatus("必須先完成行政工作！", true);
                return;
            }
            if (currentGradeIndex >= 5) return;

            TEACHER.age++;
            calcMaxEnergy(); 
            
            currentGradeIndex++;
            TEACHER.recoveriesLeft = CONFIG.maxRecoveries;
            
            let debtMsg = "";
            let netEnergy = TEACHER.maxEnergy;
            
            if (TEACHER.energyDebt > 0) {
                netEnergy -= TEACHER.energyDebt;
                debtMsg = ` (已扣除透支: ${TEACHER.energyDebt.toFixed(1)})`;
                TEACHER.energyDebt = 0; 
                if (netEnergy < 0) netEnergy = 0; 
            }
            TEACHER.currentEnergy = netEnergy;
            
            hasDoneAdmin = false;
            randomizeStudentNeed();

            setStatus(`新學年：${GRADES[currentGradeIndex]}，年齡 ${TEACHER.age}，最大心力 ${TEACHER.maxEnergy.toFixed(1)}${debtMsg}`);

            students.forEach(s => {
                s.growGrade();
                let change = 0;
                if (s.type === STUDENT_TYPES.HIGH) change = Math.random() > 0.6 ? Math.floor(Math.random() * 3) + 1 : -1;
                else if (s.type === STUDENT_TYPES.AVG) change = -Math.floor(Math.random() * 4 + 2);
                else change = -Math.floor(Math.random() * 5 + 6);

                if (change < 0) {
                    for (let i = 0; i < Math.abs(change); i++) {
                        const p = s.landedParticles.pop();
                        if(p) { scene.remove(p); particles = particles.filter(x => x !== p); }
                    }
                } else {
                    for (let i = 0; i < change; i++) spawnDirectLandedParticle(s);
                }
                s.updateLabelText();
            });
            updateUI();
        });

        function getDSEResult(totalHeight) {
            const roll = Math.random();
            if (totalHeight < 1.5) {
                if (roll < 0.7) return 'LV1';
                if (roll < 0.95) return 'LV2';
                return 'LV3';
            } else if (totalHeight < 3.5) {
                if (roll < 0.3) return 'LV2';
                if (roll < 0.7) return 'LV3';
                if (roll < 0.95) return 'LV4';
                return 'LV5';
            } else {
                if (roll < 0.2) return 'LV4';
                if (roll < 0.6) return 'LV5';
                if (roll < 0.9) return 'LV5*';
                return 'LV5**';
            }
        }

        document.getElementById('btn-dse').addEventListener('click', () => {
            isDseMode = true;
            let resultHTML = "";
            let scoreSum = 0;
            const scoreMap = {'LV1':1, 'LV2':2, 'LV3':3, 'LV4':4, 'LV5':5, 'LV5*':6, 'LV5**':7};

            students.forEach((s, idx) => {
                const h = s.getTotalHeight();
                const grade = getDSEResult(h);
                const score = scoreMap[grade];
                scoreSum += score;
                
                let color = "#333";
                if(score <= 2) color = "#c0392b";
                if(score >= 6) color = "#27ae60";

                resultHTML += `<div>學生 ${idx+1} (<span style="color:${s.type.color}">${s.type.name}</span>): <span style="color:${color}; font-weight:bold;">${grade}</span> (維度:${h.toFixed(1)}, 知識:${s.landedParticles.length})</div>`;
            });

            const avgScore = scoreSum / students.length;
            let msg = avgScore >= 4 
                ? "「做得好！這次 DSE 成績十分亮麗，這充分證明了<b>『自主學習』及『課後拔尖補底』策略行之有效</b>！同事們只要緊隨學校的發展方向，定能帶領學生再創高峰！來年我們繼續增加補課！」" 
                : "「看到這樣的成績，我稍微有點擔心。<b>我的意思不是說同事你沒有盡力</b>，我相信大家都付出了時間。但客觀數據反映出，<b>學生的潛能尚未被完全發揮</b>。來年我們繼續增加補課，以回應學生的學習需要！」";

            document.getElementById('dse-results').innerHTML = resultHTML;
            document.getElementById('principal-msg').innerHTML = msg;
            document.getElementById('modal-overlay').style.display = 'flex';
        });

        document.getElementById('btn-restart').addEventListener('click', () => location.reload());

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 修改：限制平移範圍 (只允許左右平移，且不能移出邊界)
            if (controls.target) {
                const boundary = (students.length * 2.5); // 根據學生數量計算邊界
                // 限制 X 軸範圍
                if (controls.target.x < -boundary) controls.target.x = -boundary;
                if (controls.target.x > boundary) controls.target.x = boundary;
                
                // 強制鎖定 Y 軸高度 (防止上下拖曳跑版)
                controls.target.y = targetYCamera;
            }

            students.forEach(s => {
                const pos = new THREE.Vector3(s.xPos, s.getRimY() + 1.5, 0);
                pos.project(camera);
                const x = (pos.x * .5 + .5) * window.innerWidth;
                const y = (pos.y * -.5 + .5) * window.innerHeight;
                s.labelEl.style.left = `${x}px`;
                s.labelEl.style.top = `${y}px`;
                
                // 處理標籤在畫面外時的顯示 (可選：如果需要標籤淡出)
                if (Math.abs(pos.z) > 1 || Math.abs(pos.x) > 1.1) {
                    s.labelEl.style.opacity = 0;
                } else {
                    s.labelEl.style.opacity = 1;
                }
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                const s = p.userData.student;
                
                if (p.userData.state === 'falling') {
                    p.position.add(p.userData.vel);
                    p.rotation.x += 0.05; p.rotation.y += 0.05;
                    p.userData.vel.y -= 0.008;

                    const rimY = s.getRimY();
                    if (!p.userData.rejected) {
                        const dx = p.position.x - s.xPos;
                        const dz = p.position.z;
                        const dist = Math.sqrt(dx*dx + dz*dz);
                        
                        if (p.position.y < rimY + 0.5 && p.position.y > 0) {
                            if (dist < 1.8) {
                                const fillLevel = s.landedParticles.length * 0.006;
                                if (fillLevel < rimY) {
                                    if (p.position.y <= Math.max(fillLevel, 0.2)) {
                                        p.position.y = fillLevel + Math.random() * 0.2;
                                        p.userData.state = 'landed';
                                        s.landedParticles.push(p);
                                        s.updateLabelText();
                                        p.rotation.set(0, Math.random()*Math.PI, 0);
                                        const r = Math.random() * 1.5;
                                        const t = Math.random() * Math.PI * 2;
                                        p.position.x = s.xPos + r * Math.cos(t);
                                        p.position.z = r * Math.sin(t);
                                    }
                                } else {
                                    p.userData.vel.set((Math.random()-0.5)*0.5, 0.2, (Math.random()-0.5)*0.5);
                                    p.userData.state = 'spilling';
                                }
                            } else if (dist < 2.2) {
                                p.userData.vel.x = dx * 0.1; 
                                p.userData.vel.z = dz * 0.1;
                                p.userData.state = 'spilling';
                            }
                        }
                    }
                    if (p.position.y < -5) { scene.remove(p); particles.splice(i, 1); }
                } else if (p.userData.state === 'spilling') {
                    p.position.add(p.userData.vel);
                    p.userData.vel.y -= 0.01;
                    if (p.position.y < -5) { scene.remove(p); particles.splice(i, 1); }
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('sel-student-count').addEventListener('change', (e) => initStudents(parseInt(e.target.value)));
        document.getElementById('rng-admin').addEventListener('input', updateUI);
        
        randomizeStudentNeed(); 
        document.getElementById('sel-student-count').value = "5";
        initStudents(5);
        updateUI();
        animate();

    </script>
</body>
</html>
